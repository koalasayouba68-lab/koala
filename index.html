<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accès PDF</title>

<meta name="google-site-verification" content="v1n-U1ZbQ_z94Hxt0NyvesUKsW1mK5yBPT3q6O8in4c" />

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:10px;
margin:0;
}

.box{
width:95%;
max-width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px;
width:100%;
margin-top:10px;
}

#topcode{
position:fixed;
top:10px;
right:10px;
background:black;
color:white;
padding:10px;
border-radius:10px;
display:none;
}

#timer{
position:fixed;
top:60px;
right:10px;
background:red;
color:white;
padding:10px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div id="topcode"></div>
<div id="timer"></div>

<div class="box">

<h2>📘 Accès PDF</h2>

<h3>💰 Paiement Orange Money</h3>

<p style="background:#fff3cd;padding:10px;border-radius:8px;">
📌 Composez : <b>*144*10*44295613*300#</b>
</p>

<button onclick="payer()">✔ J’ai payé</button>

<hr>

<h3>🔑 Entrer code</h3>

<input id="code" placeholder="Code reçu" style="width:100%;padding:10px;">
<button onclick="verifier()">Accéder PDF</button>

</div>

<script>

const SUPABASE_URL = "https://gkqlmpkmzfvurkzgrjlm.supabase.co";
const SUPABASE_KEY = "sb_publishable_TpKfbr8y19-DzT9dQvlr5Q_2MR-ciXr";

let countdown;

// 💰 PAYER
async function payer(){

const phone = prompt("Ton numéro Orange Money");
if(!phone) return;

localStorage.setItem("phone", phone);

await fetch(`${SUPABASE_URL}/rest/v1/payments`,{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
status:"en attente",
created_at:new Date().toISOString()
})
});

alert("Paiement envoyé ✔");
}

// 🔑 VERIFIER + START TIMER ICI
async function verifier(){

const code = document.getElementById("code").value;
const phone = localStorage.getItem("phone");

const res = await fetch(`${SUPABASE_URL}/rest/v1/payments?phone=eq.${phone}&code=eq.${code}`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const data = await res.json();

if(!data || data.length === 0){
alert("Code invalide ❌");
return;
}

const p = data[0];

if(p.status !== "confirmé"){
alert("Code non confirmé ❌");
return;
}

// ✔ ACCÈS OK
alert("Accès autorisé ✔ Téléchargement...");

const a = document.createElement("a");
a.href = "monpdf.pdf";
a.download = "monpdf.pdf";
a.click();

// 🟢 START TIMER ICI (IMPORTANT)
startTimer(p.expires_at);
}

// 🟢 TIMER DÉMARRE SEULEMENT APRÈS CODE VALIDE
function startTimer(expireDate){

clearInterval(countdown);

const exp = new Date(expireDate);

document.getElementById("timer").style.display = "block";

countdown = setInterval(()=>{

const diff = exp - new Date();

if(diff <= 0){
document.getElementById("timer").innerHTML = "❌ Code expiré";
clearInterval(countdown);
return;
}

const m = Math.floor(diff / 60000);
const s = Math.floor((diff % 60000) / 1000);

document.getElementById("timer").innerHTML =
"⏳ Expire dans " + m + "m " + s + "s";

},1000);
}

</script>

</body>
</html>
