<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accès PDF</title>

<meta name="google-site-verification" content="v1n-U1ZbQ_z94Hxt0NyvesUKsW1mK5yBPT3q6O8in4c" />

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:10px;
margin:0;
}

.box{
width:95%;
max-width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px;
width:100%;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
}

#topcode{
position:fixed;
top:10px;
right:10px;
background:black;
color:white;
padding:10px;
border-radius:10px;
display:none;
z-index:999;
}

#timer{
position:fixed;
top:60px;
right:10px;
background:red;
color:white;
padding:10px;
border-radius:10px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div id="topcode"></div>
<div id="timer"></div>

<!-- 🔐 CONNEXION -->

<div id="loginBox" class="box">

<h2>🔐 Connexion</h2>

<p>
Entre ton numéro Orange Money pour continuer.
</p>

<input
id="loginPhone"
placeholder="Numéro Orange Money">

<button onclick="connexion()">
Continuer
</button>

</div>

<!-- 📘 SITE -->

<div class="box" id="siteBox">

<h2>📘 Accès PDF</h2>

<h3>💰 Paiement Orange Money</h3>

<p style="background:#fff3cd;padding:10px;border-radius:8px;">

📌 Composez :
<b>*144*10*44295613*300#</b>

<br><br>

Puis revenez cliquer sur
<b>✔ J’ai payé</b>
pour recevoir votre code.

</p>

<button onclick="payer()">
✔ J’ai payé
</button>

<hr>

<h3>🔑 Entrer code</h3>

<input
id="code"
placeholder="Code reçu">

<button onclick="verifier()">
Accéder PDF
</button>

</div>

<script>

const SUPABASE_URL =
"https://gkqlmpkmzfvurkzgrjlm.supabase.co";

const SUPABASE_KEY =
"sb_publishable_TpKfbr8y19-DzT9dQvlr5Q_2MR-ciXr";

let countdown;

// 🔐 CONNEXION

function connexion(){

const phone =
document.getElementById("loginPhone").value;

if(!phone){

alert("Entre ton numéro");

return;
}

localStorage.setItem("phone", phone);

document.getElementById("loginBox").style.display =
"none";

document.getElementById("siteBox").style.display =
"block";

}

// 🔄 RESTAURER SESSION

window.onload = function(){

const phone = localStorage.getItem("phone");

if(phone){

document.getElementById("loginBox").style.display =
"none";

document.getElementById("siteBox").style.display =
"block";

}else{

document.getElementById("loginBox").style.display =
"block";

document.getElementById("siteBox").style.display =
"none";

}

}

// 💰 PAYER

async function payer(){

const phone = localStorage.getItem("phone");

if(!phone){

alert("Reconnecte-toi");

return;
}

await fetch(`${SUPABASE_URL}/rest/v1/payments`,{

method:"POST",

headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`,
"Content-Type":"application/json"
},

body:JSON.stringify({

phone:phone,
status:"en attente",
created_at:new Date().toISOString()

})

});

alert("Paiement envoyé ✔");

}

// 🔑 VERIFIER

async function verifier(){

const code =
document.getElementById("code").value;

const phone =
localStorage.getItem("phone");

const res = await fetch(

`${SUPABASE_URL}/rest/v1/payments?phone=eq.${phone}&code=eq.${code}`,

{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
}

);

const data = await res.json();

if(!data || data.length === 0){

alert("Code invalide ❌");

return;

}

const p = data[0];

if(p.status !== "confirmé"){

alert("Code non confirmé ❌");

return;

}

// ⏳ DEMARRER TIMER APRÈS VALIDATION

if(!p.started_at){

const started =
new Date().toISOString();

const expires =
new Date(

Date.now() + 2*60*60*1000

).toISOString();

await fetch(

`${SUPABASE_URL}/rest/v1/payments?id=eq.${p.id}`,

{

method:"PATCH",

headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`,
"Content-Type":"application/json"
},

body:JSON.stringify({

started_at:started,
expires_at:expires

})

}

);

p.started_at = started;
p.expires_at = expires;

}

// ✔ ACCÈS

alert("Accès autorisé ✔");

// 🔑 CODE

document.getElementById("topcode").style.display =
"block";

document.getElementById("topcode").innerHTML =
"🔑 Code actif : " + p.code;

// ⏳ TIMER

startTimer(p.expires_at);

// 📘 OUVRIR PDF

window.location.href = "monpdf.pdf";

}

// ⏳ TIMER

function startTimer(expireDate){

clearInterval(countdown);

const exp = new Date(expireDate);

document.getElementById("timer").style.display =
"block";

countdown = setInterval(()=>{

const diff = exp - new Date();

if(diff <= 0){

document.getElementById("timer").innerHTML =
"❌ Code expiré";

document.getElementById("topcode").style.display =
"none";

clearInterval(countdown);

return;

}

const m = Math.floor(diff / 60000);

const s = Math.floor((diff % 60000) / 1000);

document.getElementById("timer").innerHTML =

"⏳ Expire dans " + m + "m " + s + "s";

},1000);

}

</script>

</body>
</html>
